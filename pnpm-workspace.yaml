packages:
  - apps/*
  - packages/*

allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  bcrypt: true
  esbuild: true
  prisma: true

ignoredBuiltDependencies:
  - unrs-resolver

minimumReleaseAgeExclude:
  - '@expo/cli@55.0.31'
  - '@expo/metro-config@55.0.22'
  - '@expo/router-server@55.0.17'
  - babel-preset-expo@55.0.22
  - expo-file-system@55.0.21
  - expo-font@55.0.8
  - expo-modules-autolinking@55.0.23
  - expo-server@55.0.10
  - expo@55.0.25
  - expo-router@55.0.15
  - expo-symbols@55.0.9

nodeLinker: hoisted

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/engines'
  - bcrypt
  - prisma
